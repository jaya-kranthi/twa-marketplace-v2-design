<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Accept Invite — TWA Marketplace</title><link rel="stylesheet" href="app.css"></head><body>
<div class="authwrap">
  <div class="card" style="width:100%;max-width:400px;padding:2rem">
    <div class="logo" style="font-size:1.15rem;margin-bottom:.25rem">TWA <b>Marketplace</b></div>
    <h1 style="margin-bottom:.4rem">Join your organization</h1>
    <p class="muted" style="font-size:.9rem;margin-bottom:1.25rem">You've been invited to <strong style="color:var(--fg)">Acme Weather Co.</strong> as <span class="badge badge-muted">Org User</span></p>
    <form onsubmit="return false">
      <label class="label" for="p">Create password</label>
      <input class="input" id="p" type="password" placeholder="••••••••" style="margin-bottom:.9rem">
      <label class="label" for="p2">Confirm password</label>
      <input class="input" id="p2" type="password" placeholder="••••••••" style="margin-bottom:1rem">
      <button class="btn btn-primary" style="width:100%" onclick="location='catalog.html'">Join Acme Weather Co.</button>
    </form>
  </div>
</div>
</body></html>
