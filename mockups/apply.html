<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Org Application — TWA Marketplace</title><link rel="stylesheet" href="app.css"></head><body>
<div class="authwrap">
  <div class="card" style="width:100%;max-width:520px;padding:2rem">
    <div class="logo" style="font-size:1.15rem;margin-bottom:.25rem">TWA <b>Marketplace</b></div>
    <h1 style="margin-bottom:.4rem">Apply for an organization account</h1>
    <p class="muted" style="font-size:.9rem;margin-bottom:1.25rem">Applications are reviewed by TWA. You'll be notified once approved.</p>
    <form onsubmit="return false">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.9rem">
        <div><label class="label" for="o">Organization name</label><input class="input" id="o" placeholder="Acme Weather Co."></div>
        <div><label class="label" for="c">Contact name</label><input class="input" id="c" placeholder="Jane Doe"></div>
      </div>
      <label class="label" for="e" style="margin-top:.9rem">Contact email</label>
      <input class="input" id="e" type="email" placeholder="jane@acme.com" style="margin-bottom:.9rem">
      <label class="label" for="u">Intended use</label>
      <textarea class="input" id="u" rows="3" placeholder="How will your organization use TWA weather data?"></textarea>
      <button class="btn btn-primary" style="width:100%;margin-top:1rem" onclick="document.getElementById('ok').style.display='block'">Submit application</button>
    </form>
    <div id="ok" role="status" class="badge badge-ok" style="display:none;margin-top:1rem">Application received — pending review.</div>
    <p class="muted" style="font-size:.85rem;text-align:center;margin-top:1rem"><a href="signin.html">Back to sign in</a></p>
  </div>
</div>
</body></html>
