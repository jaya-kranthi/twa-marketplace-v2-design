<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In — TWA Marketplace</title><link rel="stylesheet" href="app.css"></head><body>
<div class="authwrap">
  <div class="card" style="width:100%;max-width:400px;padding:2rem">
    <div class="logo" style="font-size:1.15rem;margin-bottom:.25rem">TWA <b>Marketplace</b></div>
    <h1 style="margin-bottom:1.25rem">Sign in</h1>
    <form onsubmit="return false">
      <label class="label" for="e">Email</label>
      <input class="input" id="e" type="email" placeholder="you@org.com" autocomplete="email" style="margin-bottom:.9rem">
      <label class="label" for="p">Password</label>
      <div style="position:relative;margin-bottom:.5rem">
        <input class="input" id="p" type="password" placeholder="••••••••" autocomplete="current-password">
        <button type="button" class="btn btn-ghost" aria-pressed="false" style="position:absolute;right:4px;top:3px;min-height:34px" onclick="var i=document.getElementById('p');i.type=i.type==='password'?'text':'password';this.setAttribute('aria-pressed',i.type==='text')">Show</button>
      </div>
      <div style="text-align:right;margin-bottom:1rem"><a href="reset.html" style="font-size:.85rem">Forgot password?</a></div>
      <button class="btn btn-primary" style="width:100%" onclick="location='catalog.html'">Sign in</button>
    </form>
    <p class="muted" style="font-size:.85rem;text-align:center;margin-top:1.25rem">New organization? <a href="apply.html">Apply for an account</a></p>
  </div>
</div>
</body></html>
